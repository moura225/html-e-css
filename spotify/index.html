<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Spotify Clone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <aside class="sidebar">
        <h1 class="logo">Spotify</h1>

        <ul>
            <li>🏠 Início</li>
            <li>🔍 Buscar</li>
            <li>📚 Sua biblioteca</li>
        </ul>
    </aside>

    <main class="main">

        <h2>Playlists populares</h2>

        <div class="cards">

            <div class="card">
                <img src="https://via.placeholder.com/150">
                <h3>Top Hits</h3>
                <p>As músicas mais tocadas</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150">
                <h3>Rap Brasil</h3>
                <p>Os melhores raps</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150">
                <h3>Pop Internacional</h3>
                <p>Hits mundiais</p>
            </div>

        </div>

    </main>

</div>

</body>
</html>
